name: Sync Grepolis Data

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: # permet de lancer manuellement depuis GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://greporadar-app.vercel.app/api/cron/sync")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Status: $status"
          echo "Response: $body"
          if [ "$status" != "200" ]; then
            echo "Sync failed with status $status"
            exit 1
          fi
